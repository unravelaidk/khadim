# DBOS Configuration — durable agent execution for Khadim cloud
#
# DBOS coexists with the existing Drizzle/Postgres setup.
# System tables use sys_db_name, app tables continue through Drizzle.
# DBOS requires Postgres; SQLite is not supported in TS SDK.

language: "typescript"

database:
  hostname: ${DB_HOST:-localhost}
  port: ${DB_PORT:-5432}
  username: ${DB_USER:-postgres}
  password: ${PGPASSWORD}
  app_db_name: ${DB_NAME:-khadim}
  sys_db_name: khadim_dbos_sys
  ssl: ${DB_SSL:-false}

runtimeConfig:
  start: []
