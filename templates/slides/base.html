<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
  
  <script id="slide-data" type="application/json">
{{SLIDE_DATA}}
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'display': ['Playfair Display', 'Georgia', 'serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            'slide': {
              'bg': '#0d0b08',
              'card': '#1a1510',
              'accent': '#daa520',
              'text': '#f5f0e6',
              'muted': 'rgba(218, 165, 32, 0.7)',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }

    .chapter-marker {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 300px;
      opacity: 0.03;
      top: -50px;
      right: 40px;
      z-index: 0;
      pointer-events: none;
    }

    .glow { box-shadow: 0 0 60px rgba(218, 165, 32, 0.15); }

    .gradient-text {
      background: linear-gradient(135deg, #daa520 0%, #f5d76e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="bg-slide-bg text-slide-text">
  <div class="scroll-snap-y scroll-snap-mandatory h-screen overflow-y-scroll">
{{SLIDES_HTML}}
  </div>
</body>
</html>
