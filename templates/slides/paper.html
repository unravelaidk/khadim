<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  
  <script id="slide-data" type="application/json">
{{SLIDE_DATA}}
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'display': ['Cormorant Garamond', 'Georgia', 'serif'],
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            'slide': {
              'bg': '#faf8f3',
              'card': '#f5f1e8',
              'text': '#3d3830',
              'muted': 'rgba(139, 125, 105, 0.8)',
              'accent': '#8b7d69',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #faf8f3 0%, #f5f1e8 100%);
      padding: 60px;
    }

    /* Paper aesthetic - warm, elegant */
    .slide-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: #3d3830;
    }

    .slide-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 1.125rem;
      font-weight: 400;
      color: rgba(61, 56, 48, 0.7);
      margin-top: 1.25rem;
    }

    .slide-content {
      max-width: 900px;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(139, 125, 105, 0.15);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(139, 125, 105, 0.08);
    }

    .bullet-list {
      list-style: none;
      margin-top: 1.5rem;
    }

    .bullet-list li {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: rgba(61, 56, 48, 0.85);
      padding: 0.625rem 0;
      padding-left: 1.5rem;
      position: relative;
    }

    .bullet-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8b7d69;
    }

    .accent-line {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #8b7d69, #a09080);
      margin-bottom: 1.5rem;
      border-radius: 2px;
    }

    .quote-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      color: rgba(139, 125, 105, 0.3);
      line-height: 1;
    }
  </style>
</head>
<body class="bg-slide-bg text-slide-text">
  <div class="scroll-snap-y scroll-snap-mandatory h-screen overflow-y-scroll">
{{SLIDES_HTML}}
  </div>
</body>
</html>
