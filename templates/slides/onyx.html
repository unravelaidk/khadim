<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script id="slide-data" type="application/json">
{{SLIDE_DATA}}
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          colors: {
            'slide': {
              'bg': '#000000',
              'text': '#ffffff',
              'muted': 'rgba(255, 255, 255, 0.5)',
              'accent': '#ffffff',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000000; color: #ffffff; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 100%, #1a1a1a 0%, #000000 100%);
      padding: 0;
      position: relative;
      overflow: hidden;
      perspective: 1000px;
    }

    /* 3D Floating Elements */
    .slide::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      width: 150vh;
      height: 50vh;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      filter: blur(50px);
      z-index: 0;
    }

    .slide-content {
      width: 80%;
      max-width: 1100px;
      z-index: 10;
      transform-style: preserve-3d; 
      transform: translateZ(20px);
      padding: 4rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Typography */
    .slide-title {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.5rem;
      background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .slide-subtitle {
      font-size: 1.5rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2.5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Cards */
    .card {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 2rem;
      transition: transform 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
       border-color: rgba(255,255,255,0.2);
    }

    .bullet-list {
      list-style: none;
    }

    .bullet-list li {
      margin-bottom: 1.5rem;
      padding-left: 2rem;
      position: relative;
      font-size: 1.25rem;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
    }

    .bullet-list li::before {
      content: '';
      position: absolute;
      left: 0;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px white;
    }

    .accent-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, white, transparent);
      margin: 2rem 0;
      opacity: 0.3;
    }

    .quote-mark {
      font-size: 6rem;
      font-family: serif;
      background: linear-gradient(180deg, #ffffff 0%, #666 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.5;
      display: block;
      margin-bottom: 1rem;
    }

    /* Layout utilities for slide types if exposed via classes */
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
  </style>
</head>
<body class="bg-slide-bg text-slide-text">
  <div class="scroll-snap-y scroll-snap-mandatory h-screen overflow-y-scroll">
{{SLIDES_HTML}}
  </div>
</body>
</html>
