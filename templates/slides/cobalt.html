<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script id="slide-data" type="application/json">
{{SLIDE_DATA}}
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Space Grotesk', 'system-ui', 'sans-serif'],
          },
          colors: {
            'slide': {
              'bg': '#ffffff',
              'text': '#0f172a',
              'muted': '#3b82f6',
              'accent': '#2563eb',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Space Grotesk', sans-serif; background: #ffffff; color: #0f172a; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: grid;
      grid-template-columns: 100px 1fr 100px;
      grid-template-rows: 80px 1fr 80px;
      background: #ffffff;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    /* Grid Decoration */
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Top Bar */
    .slide::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 8px;
      background: #2563eb;
      z-index: 10;
    }

    .slide-content {
      grid-column: 2;
      grid-row: 2;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.9);
      padding: 3rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    /* Typography */
    .slide-title {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      color: #1e3a8a;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .slide-subtitle {
      font-size: 1.25rem;
      font-weight: 500;
      color: #3b82f6;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Cards & Elements */
    .card {
      background: #f8fafc;
      border-left: 4px solid #2563eb;
      padding: 2rem;
    }

    .bullet-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .bullet-list li {
      font-size: 1.125rem;
      color: #334155;
      padding: 1rem;
      background: white;
      border: 1px solid #e2e8f0;
      position: relative;
    }

    .bullet-list li::before {
      content: '0' counter(list-item);
      counter-increment: list-item;
      display: block;
      font-weight: 700;
      color: #2563eb;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    
    .bullet-list {
       counter-reset: list-item;
    }

    .accent-line {
      display: none; 
    }

    /* Corner Decor */
    .slide-number {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      font-size: 5rem;
      font-weight: 700;
      color: #f1f5f9;
      z-index: 0;
    }
    
    .quote-mark {
      font-size: 4rem;
      color: #2563eb;
      display: block;
      margin-bottom: 1rem;
    }

  </style>
</head>
<body class="bg-slide-bg text-slide-text">
  <div class="scroll-snap-y scroll-snap-mandatory h-screen overflow-y-scroll">
{{SLIDES_HTML}}
  </div>
</body>

</html>
