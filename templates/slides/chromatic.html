<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script id="slide-data" type="application/json">
{{SLIDE_DATA}}
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Poppins', 'system-ui', 'sans-serif'],
          },
          colors: {
            'slide': {
              'bg': '#fafafa',
              'text': '#1a1a2e',
              'muted': 'rgba(171, 71, 188, 0.7)',
              'accent': '#ab47bc',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', system-ui, sans-serif; background: #fafafa; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fafafa 0%, #f5f5f5 100%);
      padding: 60px;
    }

    /* Chromatic aesthetic - Vibrant creative gradient */
    .slide-title {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ec407a 0%, #ab47bc 50%, #42a5f5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .slide-subtitle {
     font-size: 1.5rem;
      font-weight: 400;
      color: rgba(26, 26, 46, 0.75);
      margin-top: 1.5rem;
    }

    .slide-content {
      max-width: 1000px;
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(171, 71, 188, 0.1);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(171, 71, 188, 0.08);
      backdrop-filter: blur(10px);
    }

    .bullet-list {
      list-style: none;
      margin-top: 2rem;
    }

    .bullet-list li {
      font-size: 1.25rem;
      font-weight: 500;
      color: #1a1a2e;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(171, 71, 188, 0.1);
      padding-left: 2rem;
      position: relative;
    }

    .bullet-list li::before {
      content: '●';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: #ab47bc;
      font-size: 0.8em;
    }

    .accent-line {
      width: 120px;
      height: 6px;
      background: linear-gradient(90deg, #ec407a, #ab47bc, #42a5f5);
      margin-bottom: 2rem;
      border-radius: 3px;
    }

    .quote-mark {
      font-size: 8rem;
      background: linear-gradient(135deg, #ec407a 0%, #ab47bc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.2;
      line-height: 1;
    }
  </style>
</head>
<body class="bg-slide-bg text-slide-text">
  <div class="scroll-snap-y scroll-snap-mandatory h-screen overflow-y-scroll">
{{SLIDES_HTML}}
  </div>
</body>
</html>
