name: CLI Release Build

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build, for example cli-v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-cli:
    name: Build CLI binaries
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: khadim-cli-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: khadim-cli-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: khadim-cli-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: khadim-cli-macos-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        shell: bash
        run: |
          git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1 || {
            echo "Tag '${TAG_NAME}' does not exist."
            exit 1
          }

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/khadim-cli -> target
          shared-key: cli-${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build CLI binary
        run: |
          cargo build --release --manifest-path apps/khadim-cli/Cargo.toml --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          strip apps/khadim-cli/target/${{ matrix.target }}/release/khadim-cli

      - name: Rename binary
        run: |
          cp apps/khadim-cli/target/${{ matrix.target }}/release/khadim-cli ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    name: Publish CLI release
    runs-on: ubuntu-latest
    needs: build-cli
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: khadim-cli-*

      - name: List artifacts
        run: ls -R artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          scope: "@khadim"

      - name: Stage npm tarballs
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#cli-v}"
          python3 apps/khadim-cli/scripts/stage_npm_package.py \
            --version "$version" \
            --package all \
            --artifact-dir artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            artifacts/**/*
            apps/khadim-cli/dist/npm/*.tgz
          fail_on_unmatched_files: false
