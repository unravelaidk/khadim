name: CLI Release Build

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build, for example cli-v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-cli:
    name: Build CLI binaries
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: khadim-cli-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: khadim-cli-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: khadim-cli-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: khadim-cli-macos-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        shell: bash
        run: |
          git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1 || {
            echo "Tag '${TAG_NAME}' does not exist."
            exit 1
          }

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/khadim-cli -> target
          shared-key: cli-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - name: Build CLI binary
        run: |
          cargo build --release --manifest-path apps/khadim-cli/Cargo.toml --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          strip apps/khadim-cli/target/${{ matrix.target }}/release/khadim-cli

      - name: Rename binary
        run: |
          cp apps/khadim-cli/target/${{ matrix.target }}/release/khadim-cli ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    name: Publish CLI release
    runs-on: ubuntu-latest
    needs: build-cli
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: khadim-cli-*

      - name: List artifacts
        run: ls -R artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@unravelai"

      - name: Stage npm tarballs
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#cli-v}"
          python3 apps/khadim-cli/scripts/stage_npm_package.py \
            --version "$version" \
            --package all \
            --artifact-dir artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            artifacts/**/*
            apps/khadim-cli/dist/npm/*.tgz
          fail_on_unmatched_files: false

      - name: Publish npm packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Missing NPM_TOKEN repository secret."
            exit 1
          fi
          version="${TAG_NAME#cli-v}"
          npm_tag="latest"
          if [[ "$version" == *-* ]]; then
            npm_tag="${version#*-}"
            npm_tag="${npm_tag%%.*}"
          fi

          publish_tarball() {
            local tarball="$1"
            local tag="$2"
            if [[ ! -f "$tarball" ]]; then
              echo "Missing npm tarball: $tarball"
              exit 1
            fi

            local publish_cmd=(npm publish "$tarball" --access public --tag "$tag")
            echo "+ ${publish_cmd[*]}"
            set +e
            local output
            output="$("${publish_cmd[@]}" 2>&1)"
            local status=$?
            set -e
            echo "$output"

            if [[ $status -eq 0 ]]; then
              return 0
            fi
            if grep -qiE "previously published|cannot publish over|version already exists" <<< "$output"; then
              echo "Skipping already-published package version for $tarball"
              return 0
            fi
            return "$status"
          }

          npm_dir="apps/khadim-cli/dist/npm"
          publish_tarball "$npm_dir/khadim-cli-npm-linux-x64-${version}.tgz" "linux-x64"
          publish_tarball "$npm_dir/khadim-cli-npm-linux-arm64-${version}.tgz" "linux-arm64"
          publish_tarball "$npm_dir/khadim-cli-npm-darwin-x64-${version}.tgz" "darwin-x64"
          publish_tarball "$npm_dir/khadim-cli-npm-darwin-arm64-${version}.tgz" "darwin-arm64"
          publish_tarball "$npm_dir/khadim-cli-npm-${version}.tgz" "$npm_tag"

      - name: Publish to GitHub Packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#cli-v}"
          npm_tag="latest"
          if [[ "$version" == *-* ]]; then
            npm_tag="${version#*-}"
            npm_tag="${npm_tag%%.*}"
          fi

          # Configure GitHub Packages registry
          cat > .npmrc << NPMRC
          @unravelai:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          NPMRC

          publish_tarball() {
            local tarball="$1"
            local tag="$2"
            if [[ ! -f "$tarball" ]]; then
              echo "Missing npm tarball: $tarball"
              exit 1
            fi

            local publish_cmd=(npm publish "$tarball" --access public --tag "$tag" --registry https://npm.pkg.github.com)
            echo "+ ${publish_cmd[*]}"
            set +e
            local output
            output="$("${publish_cmd[@]}" 2>&1)"
            local status=$?
            set -e
            echo "$output"

            if [[ $status -eq 0 ]]; then
              return 0
            fi
            if grep -qiE "previously published|cannot publish over|version already exists" <<< "$output"; then
              echo "Skipping already-published package version for $tarball"
              return 0
            fi
            return "$status"
          }

          npm_dir="apps/khadim-cli/dist/npm"
          publish_tarball "$npm_dir/khadim-cli-npm-linux-x64-${version}.tgz" "linux-x64"
          publish_tarball "$npm_dir/khadim-cli-npm-linux-arm64-${version}.tgz" "linux-arm64"
          publish_tarball "$npm_dir/khadim-cli-npm-darwin-x64-${version}.tgz" "darwin-x64"
          publish_tarball "$npm_dir/khadim-cli-npm-darwin-arm64-${version}.tgz" "darwin-arm64"
          publish_tarball "$npm_dir/khadim-cli-npm-${version}.tgz" "$npm_tag"
