name: Desktop Tests

on:
  pull_request:
    paths:
      - "apps/desktop/src-tauri/**"
      - "crates/**"
      - ".github/workflows/desktop-tests.yml"
  push:
    branches:
      - main
      - docker
    paths:
      - "apps/desktop/src-tauri/**"
      - "crates/**"
      - ".github/workflows/desktop-tests.yml"

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: desktop-tests-linux

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: Run Backend seam tests
        working-directory: apps/desktop/src-tauri
        run: cargo test backend::tests --lib

      - name: Check desktop Rust backend
        working-directory: apps/desktop/src-tauri
        run: cargo check
