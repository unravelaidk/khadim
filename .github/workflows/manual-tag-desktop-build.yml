name: Manual Tag Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-desktop-from-tag:
    name: Build desktop from tag
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux
          - os: macos-latest
            artifact_suffix: macos
          - os: windows-latest
            artifact_suffix: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        shell: bash
        run: |
          git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1 || {
            echo "Tag '${TAG_NAME}' does not exist."
            exit 1
          }

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~\AppData\Local\bun\cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: tauri-${{ matrix.os }}

      - name: Cache Tauri tooling (WiX / NSIS)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri
            ~\AppData\Roaming\tauri
          key: tauri-tooling-${{ runner.os }}-v1

      - name: Exclude build dirs from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = @(
            "${{ github.workspace }}\apps\desktop\src-tauri\target",
            "${{ github.workspace }}\node_modules",
            "$env:USERPROFILE\.cargo",
            "$env:USERPROFILE\.rustup"
          )
          foreach ($p in $paths) {
            try { Add-MpPreference -ExclusionPath $p -ErrorAction Stop } catch { Write-Host "Skipped exclusion for $p : $_" }
          }

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Configure Windows code signing
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "No Windows code-signing certificate configured. Building unsigned installer."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx

          $importedCert = Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

          if (-not $importedCert) {
            throw "Failed to import Windows code-signing certificate."
          }

          $thumbprint = ($importedCert.Thumbprint -replace '\s', '')
          if ([string]::IsNullOrWhiteSpace($thumbprint)) {
            throw "Imported Windows certificate did not expose a thumbprint."
          }

          $tauriConfigPath = "apps/desktop/src-tauri/tauri.conf.json"
          $tauriConfig = Get-Content -Raw -Path $tauriConfigPath | ConvertFrom-Json
          $tauriConfig.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $thumbprint -Force
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content -Path $tauriConfigPath

          Remove-Item -Recurse -Force certificate

      - name: Build desktop bundle
        run: bun --filter @khadim/desktop build:package

      - name: Collect release bundles
        shell: bash
        run: |
          mkdir -p release-bundles
          bundle_dir="apps/desktop/src-tauri/target/release/bundle"
          # Copy only the distributable installer files, not build intermediates.
          find "$bundle_dir" -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
               -o -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.msi' -o -name '*.exe' \
               -o -name '*.sig' \) \
            -exec cp {} release-bundles/ \;
          ls -la release-bundles

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: khadim-desktop-${{ env.TAG_NAME }}-${{ matrix.artifact_suffix }}
          path: release-bundles/*
          if-no-files-found: error

  publish-release-notes:
    name: Publish release notes
    runs-on: ubuntu-latest
    needs: build-desktop-from-tag
    env:
      TAG_NAME: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        shell: bash
        run: git checkout "refs/tags/${TAG_NAME}"

      - name: Generate release notes
        shell: bash
        run: |
          mapfile -t tags < <(git tag --list 'v*' | sort -V)
          previous_tag=""

          for i in "${!tags[@]}"; do
            if [[ "${tags[$i]}" == "${TAG_NAME}" && "$i" -gt 0 ]]; then
              previous_tag="${tags[$((i - 1))]}"
              break
            fi
          done

          if [[ -n "$previous_tag" ]]; then
            commits=$(git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..${TAG_NAME}")
          else
            commits=$(git log --no-merges --pretty=format:'- %s (%h)' "${TAG_NAME}")
          fi

          {
            echo "## Release ${TAG_NAME}"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \\`${previous_tag}\\`:"
            else
              echo "Initial tagged release commits:"
            fi
            echo
            if [[ -n "$commits" ]]; then
              echo "$commits"
            else
              echo "- No non-merge commits found for this tag."
            fi
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          path: release-bundles
          pattern: khadim-desktop-${{ env.TAG_NAME }}-*
          merge-multiple: true

      - name: List downloaded bundles
        shell: bash
        run: ls -la release-bundles || true

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          bundle_files=(release-bundles/*)
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
            if (( ${#bundle_files[@]} > 0 )); then
              gh release upload "$TAG_NAME" "${bundle_files[@]}" --clobber
            fi
          else
            if (( ${#bundle_files[@]} > 0 )); then
              gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md "${bundle_files[@]}"
            else
              gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
            fi
          fi
