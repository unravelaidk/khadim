services:
  postgres:
    image: postgres:16-alpine
    container_name: khadim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: khadim
      POSTGRES_PASSWORD: khadim123
      POSTGRES_DB: khadim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U khadim -d khadim" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
